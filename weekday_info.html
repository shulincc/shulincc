<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樹林社區大學-樹林國小 課程表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', 'Inter', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            padding: 15px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            max-width: 1920px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: white;
        }

        .header h1 {
            font-size: 3.85rem;
            font-weight: 400;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }

        .header .date {
            font-size: 1.925rem;
            font-weight: 300;
            opacity: 0.9;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            position: relative;
            user-select: none;
        }

        .header .date:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .header .date:active {
            transform: translateY(0);
            background: rgba(255, 255, 255, 0.15);
        }

        .header .date::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -25px;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-left: 6px solid rgba(255, 255, 255, 0.5);
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .header .date:hover::after {
            opacity: 1;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 2.1rem;
            font-weight: 400;
            margin-top: 100px;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            flex: 1;
            align-items: stretch;
            min-height: 0;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .schedule-grid.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .schedule-grid.three-columns {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .column {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            min-height: 0;
            transition: all 0.3s ease;
        }

        .column.hidden {
            display: none;
        }

        .column-title {
            text-align: center;
            color: white;
            font-size: 2.275rem;
            font-weight: 600;
            margin-bottom: 12px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            letter-spacing: 1px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        .classroom-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            padding-right: 3px;
        }

        .classroom-container::-webkit-scrollbar {
            width: 3px;
        }

        .classroom-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .classroom-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .classroom {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.06) 100%);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.5s ease forwards;
        }

        /* 停課樣式 */
        .classroom.suspended {
            background: linear-gradient(135deg, rgba(255,87,87,0.15) 0%, rgba(255,87,87,0.08) 100%);
            border: 1px solid rgba(255,87,87,0.3);
        }

        .classroom.suspended:hover {
            background: linear-gradient(135deg, rgba(255,87,87,0.20) 0%, rgba(255,87,87,0.12) 100%);
        }

        /* 不進教室樣式 */
        .classroom.no-classroom {
            background: linear-gradient(135deg, rgba(255,149,0,0.15) 0%, rgba(255,149,0,0.08) 100%);
            border: 1px solid rgba(255,149,0,0.3);
        }

        .classroom.no-classroom:hover {
            background: linear-gradient(135deg, rgba(255,149,0,0.20) 0%, rgba(255,149,0,0.12) 100%);
        }

        /* 延後開課樣式 */
        .classroom.delayed {
            background: linear-gradient(135deg, rgba(162,89,255,0.15) 0%, rgba(162,89,255,0.08) 100%);
            border: 1px solid rgba(162,89,255,0.35);
        }

        .classroom.delayed:hover {
            background: linear-gradient(135deg, rgba(162,89,255,0.22) 0%, rgba(162,89,255,0.12) 100%);
        }

        /* 校外樣式 */
        .classroom.outdoor {
            background: linear-gradient(135deg, rgba(0,196,159,0.15) 0%, rgba(0,196,159,0.08) 100%);
            border: 1px solid rgba(0,196,159,0.35);
        }

        .classroom.outdoor:hover {
            background: linear-gradient(135deg, rgba(0,196,159,0.22) 0%, rgba(0,196,159,0.12) 100%);
        }

        /* 一般特殊資訊樣式 */
        .classroom.special-info {
            background: linear-gradient(135deg, rgba(138,203,235,0.12) 0%, rgba(138,203,235,0.06) 100%);
            border: 1px solid rgba(138,203,235,0.25);
        }

        .classroom.special-info:hover {
            background: linear-gradient(135deg, rgba(138,203,235,0.18) 0%, rgba(138,203,235,0.10) 100%);
        }

        .classroom:nth-child(1) { animation-delay: 0.1s; }
        .classroom:nth-child(2) { animation-delay: 0.2s; }
        .classroom:nth-child(3) { animation-delay: 0.3s; }
        .classroom:nth-child(4) { animation-delay: 0.4s; }
        .classroom:nth-child(5) { animation-delay: 0.5s; }
        .classroom:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .classroom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0.10) 100%);
        }

        .classroom::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            transition: left 0.5s ease;
        }

        .classroom:hover::before {
            left: 100%;
        }

        /* ★ 修正1：有特殊狀態的卡片關閉 ::before 偽元素，避免與 badge 動畫互相干擾造成閃爍 */
        .classroom.suspended::before,
        .classroom.no-classroom::before,
        .classroom.delayed::before,
        .classroom.outdoor::before,
        .classroom.special-info::before {
            display: none;
        }

        .room-info {
            display: flex;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 10px;
            line-height: 1.2;
        }

        .room-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 2.8rem;
            font-weight: 700;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        .course-text {
            flex: 1;
            min-width: 0;
            color: white;
            font-size: 3.5rem;
            font-weight: 400;
            opacity: 0.95;
            letter-spacing: 0.2px;
            word-wrap: break-word;
            line-height: 1.3;
        }

        /* 停課標誌 */
        .suspended-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff4757, #ff6b9d);
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            margin-right: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(255, 71, 87, 0.4);
            animation: suspendedGlow 2s ease-in-out infinite alternate;
            vertical-align: middle;
            /* ★ 修正1：強制 badge 獨立 GPU 合成層，避免父層 repaint 時造成閃爍 */
            will-change: box-shadow;
            transform: translateZ(0);
        }

        @keyframes suspendedGlow {
            from { box-shadow: 0 2px 8px rgba(255, 71, 87, 0.4); }
            to { box-shadow: 0 2px 12px rgba(255, 71, 87, 0.7); }
        }

        /* 不進教室標誌 */
        .no-classroom-badge {
            display: inline-block;
            background: linear-gradient(45deg, #ff9500, #ffad33);
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            margin-right: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(255, 149, 0, 0.4);
            animation: noClassroomGlow 2s ease-in-out infinite alternate;
            vertical-align: middle;
            /* ★ 修正1：強制 badge 獨立 GPU 合成層 */
            will-change: box-shadow;
            transform: translateZ(0);
        }

        @keyframes noClassroomGlow {
            from { box-shadow: 0 2px 8px rgba(255, 149, 0, 0.4); }
            to { box-shadow: 0 2px 12px rgba(255, 149, 0, 0.7); }
        }

        /* 延後開課標誌 */
        .delayed-badge {
            display: inline-block;
            background: linear-gradient(45deg, #a259ff, #c084fc);
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            margin-right: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(162, 89, 255, 0.4);
            animation: delayedGlow 2s ease-in-out infinite alternate;
            vertical-align: middle;
            /* ★ 修正1：強制 badge 獨立 GPU 合成層 */
            will-change: box-shadow;
            transform: translateZ(0);
        }

        @keyframes delayedGlow {
            from { box-shadow: 0 2px 8px rgba(162, 89, 255, 0.4); }
            to { box-shadow: 0 2px 12px rgba(162, 89, 255, 0.7); }
        }

        /* 校外標誌 */
        .outdoor-badge {
            display: inline-block;
            background: linear-gradient(45deg, #00c49f, #00e5b0);
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 6px;
            margin-right: 8px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(0, 196, 159, 0.4);
            animation: outdoorGlow 2s ease-in-out infinite alternate;
            vertical-align: middle;
            /* ★ 修正1：強制 badge 獨立 GPU 合成層 */
            will-change: box-shadow;
            transform: translateZ(0);
        }

        @keyframes outdoorGlow {
            from { box-shadow: 0 2px 8px rgba(0, 196, 159, 0.4); }
            to { box-shadow: 0 2px 12px rgba(0, 196, 159, 0.7); }
        }

        /* 一般特殊資訊標誌 */
        .special-info-badge {
            display: inline-block;
            background: linear-gradient(45deg, #26d0ce, #1a2980);
            color: white;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 3px 7px;
            border-radius: 5px;
            margin-right: 6px;
            letter-spacing: 0.2px;
            box-shadow: 0 2px 6px rgba(38, 208, 206, 0.3);
            animation: specialInfoGlow 3s ease-in-out infinite alternate;
            vertical-align: middle;
            /* ★ 修正1：強制 badge 獨立 GPU 合成層 */
            will-change: box-shadow;
            transform: translateZ(0);
        }

        @keyframes specialInfoGlow {
            from { box-shadow: 0 2px 6px rgba(38, 208, 206, 0.3); }
            to { box-shadow: 0 2px 10px rgba(38, 208, 206, 0.6); }
        }

        .new-course {
            position: relative;
        }

        .new-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: linear-gradient(45deg, #4ECDC4, #44A08D);
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 6px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(78, 205, 196, 0.4);
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 2px 8px rgba(78, 205, 196, 0.4); }
            to { box-shadow: 0 2px 12px rgba(78, 205, 196, 0.7); }
        }

        /* A401~A405教室配色 */
        .fourth-floor-a-low .room-badge {
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .fourth-floor-a-low .column-title {
            color: #a8c0ff;
        }

        /* A406~A411教室配色 */
        .fourth-floor-a-high .room-badge {
            background: linear-gradient(90deg,#38f9d7, #004d00);
        }

        .fourth-floor-a-high .column-title {
            color: #7fffd4;
        }

        /* 三樓配色 */
        .third-floor .room-badge {
            background: linear-gradient(90deg, #f093fb, #f5576c);
        }

        .third-floor .column-title {
            color: #ffb3d9;
        }

        /* 其他樓層配色 */
        .other-floor .room-badge {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        .other-floor .column-title {
            color: #87e7ff;
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
            animation: float 30s infinite linear;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1) rotate(360deg);
                opacity: 0;
            }
        }

        /* 動態調整：當課程較多時縮小 */
        .column.dense .classroom {
            padding: 10px;
        }

        .column.dense .course-text {
            font-size: 2.8rem;
            font-weight: 400;
        }

        .column.dense .room-badge {
            font-size: 2.1rem;
            font-weight: 600;
            padding: 4px 8px;
        }

        .column.dense .suspended-badge,
        .column.dense .no-classroom-badge,
        .column.dense .delayed-badge,
        .column.dense .outdoor-badge {
            font-size: 1.4rem;
            padding: 3px 6px;
        }

        .column.dense .special-info-badge {
            font-size: 1.2rem;
            padding: 2px 5px;
        }

        /* 添加切換動畫 */
        .schedule-grid.switching {
            opacity: 0.3;
            transform: scale(0.98);
        }

        /* 載入狀態指示器 */
        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateX(100%);
        }

        .status-indicator.show {
            opacity: 1;
            transform: translateX(0);
        }

        .status-indicator.success {
            background: rgba(34, 197, 94, 0.8);
        }

        .status-indicator.error {
            background: rgba(239, 68, 68, 0.8);
        }

        @media (max-width: 1400px) {
            .schedule-grid { gap: 12px; }
            .column { padding: 15px; }
            .header h1 { font-size: 3.5rem; }
            .course-text { font-size: 3.15rem; }
            .room-badge { font-size: 2.45rem; }
            .suspended-badge, .no-classroom-badge, .delayed-badge, .outdoor-badge { font-size: 1.6rem; }
            .special-info-badge { font-size: 1.4rem; }
        }

        @media (max-width: 1200px) {
            .header h1 { font-size: 3.15rem; }
            .column-title { font-size: 2.1rem; }
            .course-text { font-size: 2.8rem; }
            .room-badge { font-size: 2.275rem; padding: 5px 10px; }
            .suspended-badge, .no-classroom-badge, .delayed-badge, .outdoor-badge { font-size: 1.5rem; padding: 3px 7px; }
            .special-info-badge { font-size: 1.3rem; padding: 2px 6px; }
            .classroom { padding: 12px; }
        }

        @media (max-width: 1024px) {
            body { padding: 8px; }
            .header h1 { font-size: 2.45rem; margin-bottom: 3px; }
            .header .date { font-size: 1.575rem; padding: 6px 12px; }
            .header { margin-bottom: 10px; }
            .schedule-grid { gap: 8px; }
            .column { padding: 10px; }
            .column-title { font-size: 1.75rem; margin-bottom: 8px; padding-bottom: 6px; }
            .course-text { font-size: 2.1rem; line-height: 1.2; }
            .room-badge { font-size: 1.75rem; padding: 3px 6px; }
            .suspended-badge, .no-classroom-badge, .delayed-badge, .outdoor-badge { font-size: 1.3rem; padding: 2px 6px; }
            .special-info-badge { font-size: 1.1rem; padding: 2px 5px; }
            .classroom { padding: 8px; }
            .room-info { gap: 6px; }
        }

        @media (max-width: 768px) {
            body { padding: 6px; }
            .header h1 { font-size: 2.1rem; }
            .header .date { font-size: 1.4rem; padding: 4px 10px; }
            .header { margin-bottom: 8px; }
            .column-title { font-size: 1.575rem; margin-bottom: 6px; padding-bottom: 4px; }
            .course-text { font-size: 1.75rem; line-height: 1.1; }
            .room-badge { font-size: 1.575rem; padding: 2px 5px; }
            .suspended-badge, .no-classroom-badge, .delayed-badge, .outdoor-badge { font-size: 1.2rem; padding: 2px 5px; }
            .special-info-badge { font-size: 1.0rem; padding: 1px 4px; }
            .classroom { padding: 6px; }
            .column { padding: 8px; }
            .schedule-grid { gap: 6px; }
            .column.dense .course-text { font-size: 1.575rem; line-height: 1.1; }
            .column.dense .room-badge { font-size: 1.4rem; padding: 2px 4px; }
            .column.dense .suspended-badge,
            .column.dense .no-classroom-badge,
            .column.dense .delayed-badge,
            .column.dense .outdoor-badge { font-size: 1.1rem; padding: 1px 4px; }
            .column.dense .special-info-badge { font-size: 0.9rem; padding: 1px 3px; }
            .column.dense .classroom { padding: 5px; }
            .column.dense .room-info { gap: 4px; }
        }

        @media (max-width: 640px) {
            body { padding: 5px; }
            .header h1 { font-size: 1.75rem; }
            .header .date { font-size: 1.225rem; padding: 3px 8px; }
            .header { margin-bottom: 6px; }
            .column-title { font-size: 1.4rem; margin-bottom: 5px; padding-bottom: 3px; }
            .course-text { font-size: 1.575rem; line-height: 1.1; }
            .room-badge { font-size: 1.4rem; padding: 2px 4px; }
            .suspended-badge, .no-classroom-badge, .delayed-badge, .outdoor-badge { font-size: 1.1rem; padding: 2px 4px; }
            .special-info-badge { font-size: 0.9rem; padding: 1px 3px; }
            .classroom { padding: 5px; }
            .column { padding: 6px; }
            .room-info { gap: 4px; }
            .schedule-grid { gap: 5px; }
            .column.dense .course-text { font-size: 1.4rem; line-height: 1.0; }
            .column.dense .room-badge { font-size: 1.225rem; padding: 1px 3px; }
            .column.dense .suspended-badge,
            .column.dense .no-classroom-badge,
            .column.dense .delayed-badge,
            .column.dense .outdoor-badge { font-size: 1.0rem; padding: 1px 3px; }
            .column.dense .special-info-badge { font-size: 0.8rem; padding: 1px 2px; }
            .column.dense .classroom { padding: 4px; }
            .column.dense .column-title { font-size: 1.3125rem; margin-bottom: 4px; }
        }

        @media (max-width: 480px) {
            body { padding: 4px; }
            .header h1 { font-size: 1.575rem; }
            .header .date { font-size: 1.05rem; padding: 2px 6px; }
            .header { margin-bottom: 5px; }
            .column-title { font-size: 1.3125rem; margin-bottom: 4px; padding-bottom: 2px; }
            .course-text { font-size: 1.4rem; line-height: 1.0; }
            .room-badge { font-size: 1.225rem; padding: 1px 3px; }
            .suspended-badge, .no-classroom-badge, .delayed-badge, .outdoor-badge { font-size: 1.0rem; padding: 1px 3px; }
            .special-info-badge { font-size: 0.8rem; padding: 1px 2px; }
            .classroom { padding: 4px; }
            .column { padding: 5px; }
            .room-info { gap: 3px; }
            .schedule-grid { gap: 4px; }

<body>
    <div class="floating-particles"></div>
    
    <div id="status-indicator" class="status-indicator">
        載入中...
    </div>
    
    <div class="container">
        <div class="header">
            <h1 id="main-title">樹林社區大學-樹林國小 課程表</h1>
            <div class="date" id="current-day" title="點擊切換星期">載入中...</div>
        </div>

        <div id="loading" class="loading">
            正在載入課程表和特殊狀態資訊...
        </div>

        <div id="schedule-grid" class="schedule-grid" style="display: none;">
            <div class="column fourth-floor-a-low" id="fourth-floor-a-low">
                <div class="column-title">A401~A405教室</div>
                <div class="classroom-container" id="fourth-a-low-container"></div>
            </div>

            <div class="column fourth-floor-a-high" id="fourth-floor-a-high">
                <div class="column-title">A406~A411教室</div>
                <div class="classroom-container" id="fourth-a-high-container"></div>
            </div>

            <div class="column third-floor" id="third-floor">
                <div class="column-title">三樓教室</div>
                <div class="classroom-container" id="third-container"></div>
            </div>

            <div class="column other-floor" id="other-floor">
                <div class="column-title">其他教室</div>
                <div class="classroom-container" id="other-container"></div>
            </div>
        </div>
    </div>

    <script>
        let globalCourseData = null;
        let globalSpecialStatusData = null;
        let currentDayIndex = 0;
        const weekdays = ["星期一", "星期二", "星期三", "星期四", "星期五", "星期六", "星期日"];
        const icalUrl = 'https://calendar.google.com/calendar/ical/shulincc.org_cu0e3cio78ukn6b0jm65t66b9o%40group.calendar.google.com/public/basic.ics';

        // ★ 修正2：localStorage 快取常數
        const CACHE_KEY_CSV  = 'shulincc_csv_cache';
        const CACHE_KEY_ICAL = 'shulincc_ical_cache';
        const CACHE_KEY_TIME = 'shulincc_cache_time';
        const CACHE_TTL      = 6 * 60 * 60 * 1000; // 6小時

        // ★ 修正2：快取工具函式
        function saveCache(csvData, icalData) {
            try {
                localStorage.setItem(CACHE_KEY_CSV,  csvData);
                localStorage.setItem(CACHE_KEY_ICAL, icalData || '');
                localStorage.setItem(CACHE_KEY_TIME, Date.now().toString());
            } catch(e) {
                console.warn('快取寫入失敗:', e);
            }
        }

        function loadCache() {
            try {
                const csv  = localStorage.getItem(CACHE_KEY_CSV);
                const ical = localStorage.getItem(CACHE_KEY_ICAL);
                const time = parseInt(localStorage.getItem(CACHE_KEY_TIME) || '0');
                if (!csv) return null;
                return { csv, ical: ical || '', time, isStale: Date.now() - time > CACHE_TTL };
            } catch(e) {
                return null;
            }
        }

        function showStatus(message, type = 'info', duration = 3000) {
            const indicator = document.getElementById('status-indicator');
            indicator.textContent = message;
            indicator.className = `status-indicator show ${type}`;
            if (duration > 0) {
                setTimeout(() => indicator.classList.remove('show'), duration);
            }
        }

        function getCurrentDay() {
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return days[new Date().getDay()];
        }

        function getCurrentDayIndex() {
            return weekdays.indexOf(getCurrentDay());
        }

        function formatDateForComparison(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        function getDateForDayIndex(dayIndex) {
            const today = new Date();
            const diff = dayIndex - getCurrentDayIndex();
            const target = new Date(today);
            target.setDate(today.getDate() + diff);
            return target;
        }

        function getCourseSpecialStatus(courseName, targetDate) {
            if (!globalSpecialStatusData || globalSpecialStatusData.length === 0) {
                return { type: 'normal' };
            }

            try {
                const targetDateStr = formatDateForComparison(targetDate);

                for (const statusEvent of globalSpecialStatusData) {
                    if (!statusEvent.start) continue;
                    const eventDateStr = formatDateForComparison(statusEvent.start);
                    if (eventDateStr !== targetDateStr) continue;

                    const eventTitle = statusEvent.summary || '';
                    let courseNameFromEvent = '';
                    let status = { type: 'normal' };

                    if (eventTitle.includes('【停課】')) {
                        courseNameFromEvent = eventTitle.replace('【停課】', '').trim();
                        status = { type: 'suspended', label: '停課' };
                    } else if (eventTitle.includes('【不進教室】')) {
                        courseNameFromEvent = eventTitle.replace('【不進教室】', '').trim();
                        status = { type: 'no-classroom', label: '不進教室' };
                    } else if (eventTitle.includes('【延後開課】')) {
                        courseNameFromEvent = eventTitle.replace('【延後開課】', '').trim();
                        status = { type: 'delayed', label: '延後開課' };
                    } else if (eventTitle.includes('【延後】')) {
                        courseNameFromEvent = eventTitle.replace('【延後】', '').trim();
                        status = { type: 'delayed', label: '延後開課' };
                    } else if (eventTitle.includes('【延】')) {
                        courseNameFromEvent = eventTitle.replace('【延】', '').trim();
                        status = { type: 'delayed', label: '延後開課' };
                    } else if (eventTitle.includes('【校外】')) {
                        courseNameFromEvent = eventTitle.replace('【校外】', '').trim();
                        status = { type: 'outdoor', label: '校外上課' };
                    } else if (eventTitle.includes('【老師晚到】')) {
                        courseNameFromEvent = eventTitle.replace('【老師晚到】', '').trim();
                        status = { type: 'special-info', label: '老師晚到' };
                    } else if (eventTitle.includes('【補課】')) {
                        courseNameFromEvent = eventTitle.replace('【補課】', '').trim();
                        status = { type: 'special-info', label: '補課' };
                    } else if (eventTitle.includes('【教室異動】')) {
                        courseNameFromEvent = eventTitle.replace('【教室異動】', '').trim();
                        status = { type: 'special-info', label: '教室異動' };
                    } else if (eventTitle.includes('【時間異動】')) {
                        courseNameFromEvent = eventTitle.replace('【時間異動】', '').trim();
                        status = { type: 'special-info', label: '時間異動' };
                    } else if (eventTitle.includes('*')) {
                        const matches = eventTitle.match(/^([^*]+)\*([^*]+)\*/);
                        if (matches) {
                            courseNameFromEvent = matches[1].trim();
                            status = { type: 'special-info', label: matches[2].trim() };
                        } else continue;
                    } else if (eventTitle.includes('【') && eventTitle.includes('】')) {
                        const bracketMatch = eventTitle.match(/【([^】]+)】(.*)$/);
                        if (bracketMatch) {
                            courseNameFromEvent = bracketMatch[2].trim();
                            status = { type: 'special-info', label: bracketMatch[1].trim() };
                        } else continue;
                    } else {
                        continue;
                    }

                    const normalizedCourseName = courseName.replace(/【新】/g, '').trim();
                    const normalizedEventName = courseNameFromEvent.trim();
                    const isMatch = normalizedCourseName === normalizedEventName ||
                                   normalizedCourseName.includes(normalizedEventName) ||
                                   normalizedEventName.includes(normalizedCourseName) ||
                                   normalizedCourseName.split('（')[0] === normalizedEventName.split('（')[0] ||
                                   normalizedCourseName.substring(0, Math.min(6, normalizedCourseName.length)) ===
                                   normalizedEventName.substring(0, Math.min(6, normalizedEventName.length));

                    if (isMatch) {
                        console.log(`特殊狀態匹配: 課程"${courseName}" 在 ${targetDateStr} 狀態為 ${status.type} (${status.label})`);
                        return status;
                    }
                }

                return { type: 'normal' };
            } catch (error) {
                console.error('檢查課程特殊狀態時發生錯誤:', error);
                return { type: 'normal' };
            }
        }

        // ★ 修正2：iCal 實際載入邏輯拆成獨立函式，方便套上總逾時
        async function _doLoadSpecialStatusData() {
            const proxyServices = [
                { name: 'allorigins',    url: 'https://api.allorigins.win/raw?url=' },
                { name: 'codetabs',      url: 'https://api.codetabs.com/v1/proxy?quest=' },
                { name: 'cors-anywhere', url: 'https://cors-anywhere.herokuapp.com/' },
                { name: 'thingproxy',    url: 'https://thingproxy.freeboard.io/fetch/' },
            ];

            for (const proxy of proxyServices) {
                try {
                    console.log(`嘗試使用 ${proxy.name} 代理服務...`);
                    const proxyUrl = proxy.url + encodeURIComponent(icalUrl);
                    const response = await Promise.race([
                        fetch(proxyUrl, { headers: { 'Accept': 'text/calendar,*/*' } }),
                        // ★ 修正2：每個 proxy 的逾時從 10000ms 縮短為 5000ms，加速失敗偵測
                        new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 5000))
                    ]);

                    if (response.ok) {
                        const icalData = await response.text();
                        if (icalData.includes('BEGIN:VCALENDAR') && icalData.includes('BEGIN:VEVENT')) {
                            const specialStatuses = parseICalSpecialStatuses(icalData);
                            console.log(`使用 ${proxy.name} 成功載入 ${specialStatuses.length} 筆資料`);
                            // ★ 修正2：成功時更新快取裡的 iCal 部分
                            const cachedCsv = localStorage.getItem(CACHE_KEY_CSV) || '';
                            saveCache(cachedCsv, icalData);
                            showStatus(`載入課程狀態成功 (${specialStatuses.length} 筆資料)`, 'success');
                            return specialStatuses;
                        }
                    }
                } catch (error) {
                    console.log(`代理服務 ${proxy.name} 失敗:`, error.message);
                }
            }

            // 直接訪問 iCal
            try {
                console.log('嘗試直接訪問 iCal...');
                const response = await fetch(icalUrl);
                if (response.ok) {
                    const icalData = await response.text();
                    const specialStatuses = parseICalSpecialStatuses(icalData);
                    const cachedCsv = localStorage.getItem(CACHE_KEY_CSV) || '';
                    saveCache(cachedCsv, icalData);
                    showStatus(`直接載入成功 (${specialStatuses.length} 筆資料)`, 'success');
                    return specialStatuses;
                }
            } catch (directError) {
                console.log('直接訪問失敗:', directError.message);
            }

            throw new Error('所有載入方式都失敗');
        }

        // ★ 修正2：loadSpecialStatusData 加上 30 秒總逾時保護 + 快取救援
        async function loadSpecialStatusData() {
            // 總逾時 30 秒：超過即放棄，不讓 fetch 持續掛著導致電視瀏覽器踢頁面
            const overallTimeout = new Promise((_, reject) =>
                setTimeout(() => reject(new Error('Overall timeout after 30s')), 30000)
            );

            try {
                showStatus('正在載入課程狀態資訊...', 'info', 0);
                return await Promise.race([_doLoadSpecialStatusData(), overallTimeout]);
            } catch (error) {
                console.warn('特殊狀態載入失敗或逾時:', error.message);

                // ★ 修正2：失敗時嘗試從快取救援 iCal 資料
                const cache = loadCache();
                if (cache && cache.ical && cache.ical.includes('BEGIN:VCALENDAR')) {
                    const ageMin = Math.round((Date.now() - cache.time) / 60000);
                    console.log(`使用 ${ageMin} 分鐘前的 iCal 快取`);
                    showStatus(`課程狀態使用 ${ageMin} 分鐘前快取`, 'error');
                    return parseICalSpecialStatuses(cache.ical);
                }

                showStatus('無法載入課程狀態，僅顯示基本課程', 'error');
                return [];
            }
        }

        function parseICalSpecialStatuses(icalText) {
            const specialStatuses = [];
            const lines = icalText.split('\n');
            let currentEvent = null;

            for (let line of lines) {
                line = line.trim();

                if (line === 'BEGIN:VEVENT') {
                    currentEvent = {};
                } else if (line === 'END:VEVENT' && currentEvent) {
                    if (currentEvent.summary && (
                        currentEvent.summary.includes('【停課】') ||
                        currentEvent.summary.includes('【不進教室】') ||
                        currentEvent.summary.includes('【延後開課】') ||
                        currentEvent.summary.includes('【延後】') ||
                        currentEvent.summary.includes('【延】') ||
                        currentEvent.summary.includes('【校外】') ||
                        currentEvent.summary.includes('【老師晚到】') ||
                        currentEvent.summary.includes('【補課】') ||
                        currentEvent.summary.includes('【教室異動】') ||
                        currentEvent.summary.includes('【時間異動】') ||
                        currentEvent.summary.includes('*') ||
                        currentEvent.summary.includes('線上') ||
                        currentEvent.summary.includes('異動')
                    )) {
                        specialStatuses.push(currentEvent);
                    }
                    currentEvent = null;
                } else if (currentEvent && line.includes(':')) {
                    const [key, ...valueParts] = line.split(':');
                    const value = valueParts.join(':');

                    if (key === 'SUMMARY') {
                        currentEvent.summary = value;
                    } else if (key === 'DESCRIPTION') {
                        currentEvent.description = value;
                    } else if (key.startsWith('DTSTART')) {
                        currentEvent.start = parseICalDate(value);
                    } else if (key.startsWith('DTEND')) {
                        currentEvent.end = parseICalDate(value);
                    }
                }
            }

            console.log('解析到的特殊狀態資訊:', specialStatuses);
            return specialStatuses;
        }

        function parseICalDate(dateStr) {
            if (dateStr.includes('T')) {
                const cleanDate = dateStr.replace(/[TZ]/g, '');
                return new Date(
                    cleanDate.substr(0, 4),
                    cleanDate.substr(4, 2) - 1,
                    cleanDate.substr(6, 2),
                    cleanDate.substr(8, 2) || '00',
                    cleanDate.substr(10, 2) || '00'
                );
            } else {
                return new Date(dateStr.substr(0, 4), dateStr.substr(4, 2) - 1, dateStr.substr(6, 2));
            }
        }

        function initDayToggle() {
            document.getElementById('current-day').addEventListener('click', function() {
                if (globalCourseData) {
                    currentDayIndex = (currentDayIndex + 1) % weekdays.length;
                    const scheduleGrid = document.getElementById('schedule-grid');
                    scheduleGrid.classList.add('switching');
                    setTimeout(() => {
                        displaySchedule(globalCourseData, weekdays[currentDayIndex]);
                        scheduleGrid.classList.remove('switching');
                    }, 150);
                }
            });
        }

        function createClassroomCard(classroom, course, isNew = false, specialStatus = { type: 'normal' }) {
            const statusClasses = [];
            if (isNew) statusClasses.push('new-course');
            if (specialStatus.type !== 'normal') statusClasses.push(specialStatus.type);

            const div = document.createElement('div');
            div.className = `classroom ${statusClasses.join(' ')}`;

            const newBadge = isNew ? '<div class="new-badge">NEW</div>' : '';

            let statusBadge = '';
            switch (specialStatus.type) {
                case 'suspended':
                    statusBadge = '<span class="suspended-badge">停課</span>';
                    break;
                case 'no-classroom':
                    statusBadge = '<span class="no-classroom-badge">不進教室</span>';
                    break;
                case 'delayed':
                    statusBadge = `<span class="delayed-badge">${specialStatus.label || '延後開課'}</span>`;
                    break;
                case 'outdoor':
                    statusBadge = `<span class="outdoor-badge">${specialStatus.label || '校外上課'}</span>`;
                    break;
                case 'special-info':
                    statusBadge = `<span class="special-info-badge">${specialStatus.label}</span>`;
                    break;
                default:
                    statusBadge = '';
            }

            div.innerHTML = `
                ${newBadge}
                <div class="room-info">
                    <span class="room-badge">${classroom}</span>
                    <span class="course-text">${statusBadge}${course}</span>
                </div>
            `;

            return div;
        }

        function getAClassroomRange(classroom) {
            if (!classroom.startsWith('A')) return null;
            const number = parseInt(classroom.substring(1));
            if (number >= 401 && number <= 405) return 'low';
            if (number >= 406 && number <= 411) return 'high';
            return null;
        }

        // ★ 修正2：loadScheduleData 加上快取讀寫
        async function loadScheduleData() {
            try {
                showStatus('正在載入課程資料...', 'info', 0);
                const response = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQJOKTRij4QISmyTwOOMBkYy1f-Z3CkK419ZCTR0c2Amu7mnXNycNM7lcCwHsVldr8nqNQpTpoW5ayN/pub?gid=1336397011&single=true&output=csv');
                const csvData = await response.text();

                // ★ 修正2：成功時存入 CSV 快取（iCal 部分保留原有值）
                const cachedIcal = localStorage.getItem(CACHE_KEY_ICAL) || '';
                saveCache(csvData, cachedIcal);

                showStatus('課程資料載入成功', 'success');
                return parseCSV(csvData);

            } catch (error) {
                console.error('載入課程資料失敗，嘗試使用快取:', error);

                // ★ 修正2：失敗時從快取救援
                const cache = loadCache();
                if (cache) {
                    const ageMin = Math.round((Date.now() - cache.time) / 60000);
                    showStatus(`離線中，顯示 ${ageMin} 分鐘前的快取資料`, 'error');
                    return parseCSV(cache.csv);
                }

                showStatus('載入課程資料失敗', 'error');
                document.getElementById('loading').textContent = '載入課程資料失敗，請重新整理頁面';
                return null;
            }
        }

        function parseCSV(csvData) {
            const lines = csvData.split('\n');
            const courses = [];
            for (let i = 2; i < lines.length; i++) {
                const row = lines[i].split(',');
                const floor = row[1]?.trim();
                const classroom = row[2]?.trim();
                if (floor && classroom) {
                    const courseInfo = { floor, classroom, courses: {} };
                    for (let j = 0; j < weekdays.length; j++) {
                        const course = row[3 + j]?.trim();
                        if (course && course !== '' && course !== '#N/A' && course !== '#REF!') {
                            courseInfo.courses[weekdays[j]] = course;
                        }
                    }
                    courses.push(courseInfo);
                }
            }
            return courses;
        }

        function displaySchedule(courses, dayOfWeek) {
            document.getElementById('current-day').textContent = dayOfWeek;

            ['fourth-a-low-container', 'fourth-a-high-container', 'third-container', 'other-container']
                .forEach(id => document.getElementById(id).innerHTML = '');

            const targetDate = getDateForDayIndex(currentDayIndex);
            console.log(`顯示 ${dayOfWeek} 的課程，日期: ${formatDateForComparison(targetDate)}`);

            const fourthFloorALow = [], fourthFloorAHigh = [], thirdFloor = [], otherFloors = [];

            courses.forEach(item => {
                const course = item.courses[dayOfWeek];
                if (!course) return;
                if (item.classroom === '區務地下室(早)' || item.classroom === '區務地下室(下午)') return;

                const isNew = course.includes('【新】');
                const specialStatus = getCourseSpecialStatus(course, targetDate);

                if (item.floor === '4樓') {
                    const aRange = getAClassroomRange(item.classroom);
                    if (aRange === 'low') fourthFloorALow.push({ classroom: item.classroom, course, isNew, specialStatus });
                    else if (aRange === 'high') fourthFloorAHigh.push({ classroom: item.classroom, course, isNew, specialStatus });
                    else otherFloors.push({ classroom: item.classroom, course, isNew, specialStatus });
                } else if (item.floor === '3樓') {
                    thirdFloor.push({ classroom: item.classroom, course, isNew, specialStatus });
                } else {
                    const displayName = ['B1', '1樓', '2樓'].includes(item.floor)
                        ? `${item.floor} ${item.classroom}` : item.classroom;
                    otherFloors.push({ classroom: displayName, course, isNew, specialStatus });
                }
            });

            fourthFloorALow.forEach(item => document.getElementById('fourth-a-low-container').appendChild(
                createClassroomCard(item.classroom, item.course, item.isNew, item.specialStatus)));
            fourthFloorAHigh.forEach(item => document.getElementById('fourth-a-high-container').appendChild(
                createClassroomCard(item.classroom, item.course, item.isNew, item.specialStatus)));
            thirdFloor.forEach(item => document.getElementById('third-container').appendChild(
                createClassroomCard(item.classroom, item.course, item.isNew, item.specialStatus)));
            otherFloors.forEach(item => document.getElementById('other-container').appendChild(
                createClassroomCard(item.classroom, item.course, item.isNew, item.specialStatus)));

            const aHighColumn = document.getElementById('fourth-floor-a-high');
            const scheduleGrid = document.getElementById('schedule-grid');
            if (fourthFloorAHigh.length === 0) {
                aHighColumn.classList.add('hidden');
                scheduleGrid.classList.add('three-columns');
            } else {
                aHighColumn.classList.remove('hidden');
                scheduleGrid.classList.remove('three-columns');
            }

            const columnData = [
                { container: 'fourth-a-low-container', column: 'fourth-floor-a-low' },
                { container: 'fourth-a-high-container', column: 'fourth-floor-a-high' },
                { container: 'third-container', column: 'third-floor' },
                { container: 'other-container', column: 'other-floor' }
            ];

            function getDenseThreshold() {
                const w = window.innerWidth, h = window.innerHeight;
                if (w <= 480 || h <= 500) return 2;
                if (w <= 640 || h <= 600) return 3;
                if (w <= 768) return 4;
                if (w <= 1024) return 5;
                return 6;
            }

            let needDenseMode = false;
            const threshold = getDenseThreshold();
            columnData.forEach(({ container }) => {
                if (document.getElementById(container).children.length > threshold) needDenseMode = true;
            });
            columnData.forEach(({ column }) => {
                document.getElementById(column).classList.toggle('dense', needDenseMode);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('schedule-grid').style.display = 'grid';
            setTimeout(() => document.getElementById('schedule-grid').classList.add('loaded'), 50);
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 25 + 8;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            const duration = Math.random() * 20 + 25;
            particle.style.animationDuration = duration + 's';
            particle.style.animationDelay = Math.random() * 15 + 's';
            document.querySelector('.floating-particles').appendChild(particle);
            setTimeout(() => particle.remove(), duration * 1000);
        }

        async function init() {
            initDayToggle();
            setInterval(createParticle, 8000);
            for (let i = 0; i < 2; i++) setTimeout(createParticle, i * 4000);

            try {
                showStatus('正在載入課程表...', 'info', 0);
                const courses = await loadScheduleData();
                if (!courses) throw new Error('無法載入課程資料');
                globalCourseData = courses;

                try {
                    globalSpecialStatusData = await loadSpecialStatusData();
                    console.log(`特殊狀態載入完成: ${globalSpecialStatusData.length} 筆資料`);
                } catch {
                    globalSpecialStatusData = [];
                }

                const todayIndex = getCurrentDayIndex();
                currentDayIndex = todayIndex >= 0 ? todayIndex : 0;
                displaySchedule(courses, weekdays[currentDayIndex]);
                showStatus('課程表載入完成', 'success');

                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => displaySchedule(courses, weekdays[currentDayIndex]), 150);
                });
            } catch (error) {
                console.error('初始化失敗:', error);
                showStatus('載入失敗，請重新整理頁面', 'error');
                document.getElementById('loading').innerHTML = `
                    <div style="color: #ff6b6b; font-size: 1.8rem; text-align: center; margin-top: 50px;">
                        <p>😔 載入課程表失敗</p>
                        <p style="font-size: 1.2rem; margin-top: 20px; opacity: 0.8;">請檢查網路連線並重新整理頁面</p>
                        <button onclick="location.reload()" style="
                            margin-top: 20px; padding: 10px 20px;
                            background: linear-gradient(45deg, #667eea, #764ba2);
                            color: white; border: none; border-radius: 8px;
                            font-size: 1rem; cursor: pointer;">重新載入</button>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
